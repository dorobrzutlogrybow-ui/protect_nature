<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image.prod.js"></script>
</head>

<body>
  <a-scene mindar-image="imageTargetSrc: target.mind;" embedded color-space="sRGB">
    
    <a-assets>
      <video id="vid" src="video.mp4" autoplay loop="true" muted playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#vid" width="1" height="0.5" position="0 0 0"></a-video>
    </a-entity>

  </a-scene>
</body>
</html>
